<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Manager</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.1/sse.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface-hover: #21262d;
            --border: #30363d;
            --border-light: #3d4450;
            --text: #c9d1d9;
            --text-dim: #8b949e;
            --accent: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.3);
            --green: #3fb950;
            --green-glow: rgba(63, 185, 80, 0.4);
            --red: #f85149;
            --red-glow: rgba(248, 81, 73, 0.3);
            --orange: #d2991d;
            --radius: 10px;
            --radius-sm: 8px;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5);
            --transition-fast: 0.15s ease;
            --transition-normal: 0.25s ease;
            --transition-slow: 0.35s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; padding: 24px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { font-size: 24px; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; font-weight: 600; }
        .badge { font-size: 12px; padding: 3px 10px; border-radius: 12px; font-weight: 600; }
        .badge-ok { background: var(--green); color: #000; }
        .badge-warn { background: var(--orange); color: #000; }

        /* Card */
        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 20px; margin-bottom: 20px;
            transition: box-shadow var(--transition-normal), border-color var(--transition-normal);
        }
        .card:hover {
            border-color: var(--border-light);
            box-shadow: var(--shadow-md);
        }
        .card h2 { font-size: 16px; margin-bottom: 14px; color: var(--accent); font-weight: 600; }

        /* Add form */
        .add-row { display: flex; gap: 10px; }
        .add-row input {
            flex: 1; padding: 12px 16px; border-radius: var(--radius);
            border: 1px solid var(--border); background: var(--bg); color: var(--text);
            font-size: 14px; outline: none;
            transition: all var(--transition-normal);
            position: relative;
        }
        .add-row input::placeholder {
            color: var(--text-dim);
            opacity: 0.7;
        }
        .add-row input:hover {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .add-row input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow), 0 0 20px rgba(88, 166, 255, 0.15);
        }
        .btn {
            padding: 12px 20px; border-radius: var(--radius); border: none;
            font-size: 14px; cursor: pointer; font-weight: 600;
            transition: all var(--transition-fast);
            position: relative;
            overflow: hidden;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left var(--transition-slow);
        }
        .btn:hover::before {
            left: 100%;
        }
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        .btn:active {
            transform: translateY(0);
            box-shadow: var(--shadow-sm);
        }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { background: #79c0ff; }
        .btn-danger { background: transparent; border: 1px solid var(--red); color: var(--red); }
        .btn-danger:hover { background: var(--red-glow); }
        .btn-sm { padding: 7px 14px; font-size: 12px; border-radius: var(--radius-sm); }

        /* Progress */
        .progress { margin-top: 14px; display: none; }
        .progress.active { display: block; }
        .progress-bar {
            height: 5px; background: rgba(48, 54, 61, 0.6); border-radius: 3px;
            margin-top: 10px; overflow: hidden;
            position: relative;
        }
        .progress-fill {
            height: 100%; background: var(--accent); border-radius: 3px;
            width: 0%; transition: width var(--transition-normal);
            position: relative;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255,255,255,0.3),
                transparent
            );
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .progress-text { font-size: 13px; color: var(--text-dim); margin-top: 6px; }

        /* Session list */
        .session-item {
            display: flex; align-items: center; gap: 12px;
            padding: 14px; margin: 4px -14px;
            border-radius: var(--radius-sm);
            transition: all var(--transition-fast);
            cursor: pointer;
        }
        .session-item:last-child { margin-bottom: -14px; }
        .session-item:hover {
            background: var(--surface-hover);
            transform: translateX(4px);
        }
        .session-icon { font-size: 18px; }
        .session-info { flex: 1; }
        .session-domain { font-weight: 600; font-size: 14px; }
        .session-meta { font-size: 12px; color: var(--text-dim); margin-top: 3px; }
        .session-tag {
            font-size: 11px; padding: 2px 8px; border-radius: 10px;
            font-weight: 600;
        }
        .tag-expired { background: var(--red); color: #fff; }
        .tag-active { background: var(--green); color: #000; }
        .session-actions { display: flex; gap: 6px; opacity: 0; transition: opacity var(--transition-fast); }
        .session-item:hover .session-actions { opacity: 1; }

        /* Detail modal */
        .detail-row {
            display: flex; padding: 8px 0; border-bottom: 1px solid rgba(48, 54, 61, 0.5);
            font-size: 13px;
            transition: background var(--transition-fast);
        }
        .detail-row:hover {
            background: rgba(88, 166, 255, 0.05);
            margin: 0 -8px;
            padding-left: 8px;
            padding-right: 8px;
            border-radius: 4px;
        }
        .detail-name { width: 200px; color: var(--accent); flex-shrink: 0; font-weight: 500; }
        .detail-value { word-break: break-all; white-space: pre-wrap; flex: 1; min-width: 0; }
        .detail-row-auth .detail-name { width: 400px; }
        .detail-section-title {
            font-size: 14px; font-weight: 600; color: var(--orange);
            margin: 14px 0 8px 0; padding-bottom: 6px; border-bottom: 1px solid var(--border);
        }
        .auth-badge {
            font-size: 10px; padding: 2px 8px; border-radius: 8px;
            background: var(--orange); color: #000; margin-left: 6px; font-weight: 600;
        }
        .empty-state { text-align: center; padding: 48px; color: var(--text-dim); font-size: 14px; }

        /* Toast */
        .toast {
            position: fixed; top: 24px; right: 24px; padding: 14px 22px;
            border-radius: var(--radius); font-size: 14px; z-index: 100;
            font-weight: 500;
            animation: slideIn .3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: var(--shadow-lg);
        }
        .toast-success { background: var(--green); color: #000; }
        .toast-error { background: var(--red); color: #fff; }
        @keyframes slideIn {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        /* MCP Connection Status */
        .status-bar {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; background: var(--surface);
            border: 1px solid var(--border); border-radius: var(--radius);
            margin-bottom: 20px; font-size: 13px;
            transition: all var(--transition-normal);
        }
        .status-bar:hover {
            border-color: var(--border-light);
        }
        .status-dot {
            width: 10px; height: 10px; border-radius: 50%;
            flex-shrink: 0;
            transition: all var(--transition-normal);
        }
        .status-dot.connected { 
            background: var(--green); 
            box-shadow: 0 0 10px var(--green-glow), 0 0 20px rgba(63, 185, 80, 0.2); 
        }
        .status-dot.disconnected { 
            background: var(--orange); 
            box-shadow: 0 0 6px rgba(210, 153, 29, 0.3); 
        }
        .status-dot.connecting { 
            background: var(--accent); 
            animation: pulse 1.2s infinite;
            box-shadow: 0 0 10px var(--accent-glow);
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.1); }
        }
        .status-label { font-weight: 600; }
        .status-idle { color: var(--text-dim); font-size: 12px; margin-left: auto; }
        .btn-outline {
            padding: 6px 14px; border-radius: var(--radius-sm); font-size: 12px;
            cursor: pointer; font-weight: 600; border: 1px solid var(--border);
            color: var(--text-dim); background: transparent; transition: all var(--transition-fast);
        }
        .btn-outline:hover { 
            border-color: var(--accent); 
            color: var(--accent); 
            background: var(--accent-glow);
        }
        .btn-outline.danger:hover { 
            border-color: var(--red); 
            color: var(--red); 
            background: var(--red-glow);
        }
        .btn-refresh {
            padding: 7px 12px; border-radius: var(--radius-sm); font-size: 12px;
            cursor: pointer; background: transparent; border: 1px solid var(--border);
            color: var(--text-dim); transition: all var(--transition-fast);
        }
        .btn-refresh:hover { 
            border-color: var(--accent); 
            color: var(--accent); 
            background: var(--accent-glow); 
        }
        .btn-refresh:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Browser mode selector */
        .browser-select {
            padding: 5px 10px; border-radius: var(--radius-sm); font-size: 12px;
            cursor: pointer; background: var(--bg); border: 1px solid var(--border);
            color: var(--text); outline: none; font-weight: 500;
            transition: all var(--transition-fast);
        }
        .browser-select:hover { border-color: var(--accent); }
        .browser-select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }

        /* Log panel */
        .log-panel {
            background: #0a0e13; border: 1px solid var(--border);
            border-radius: var(--radius); margin-bottom: 20px; overflow: hidden;
        }
        .log-header {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 16px; background: #111820; border-bottom: 1px solid var(--border);
            cursor: pointer; user-select: none;
            transition: background var(--transition-fast);
        }
        .log-header:hover { background: #161d27; }
        .log-header h2 { font-size: 14px; color: var(--text); margin: 0; flex: 1; font-weight: 600; }
        .log-count { font-size: 11px; color: var(--text-dim); background: var(--bg); padding: 2px 8px; border-radius: 10px; }
        .log-actions { display: flex; gap: 4px; }
        .log-btn {
            padding: 4px 10px; border-radius: 4px; font-size: 11px;
            cursor: pointer; border: 1px solid var(--border);
            background: transparent; color: var(--text-dim);
            transition: all var(--transition-fast);
        }
        .log-btn:hover { border-color: var(--accent); color: var(--accent); }
        .log-body {
            max-height: 300px; overflow-y: auto; padding: 10px 0;
            font-family: "Cascadia Code", "JetBrains Mono", "Fira Code", "Consolas", monospace;
            font-size: 12px; line-height: 1.7;
        }
        .log-body.collapsed { display: none; }
        .log-entry {
            padding: 3px 16px; display: flex; gap: 10px; align-items: flex-start;
            border-bottom: 1px solid rgba(48, 54, 61, 0.3);
        }
        .log-entry:last-child { border-bottom: none; }
        .log-time { color: var(--text-dim); flex-shrink: 0; white-space: nowrap; width: 70px; }
        .log-tag {
            font-size: 10px; padding: 1px 6px; border-radius: 4px; flex-shrink: 0;
            font-weight: 600; text-transform: uppercase; min-width: 60px; text-align: center;
        }
        .log-tag.error { background: var(--red); color: #fff; }
        .log-tag.completed { background: var(--green); color: #000; }
        .log-tag.cancelled { background: var(--orange); color: #000; }
        .log-tag.mcp { background: var(--accent); color: #000; }
        .log-tag.system { background: #6e7681; color: #fff; }
        .log-tag.task { background: #6e7681; color: #fff; }
        .log-msg { color: var(--text); word-break: break-all; }
        .log-empty { text-align: center; padding: 20px; color: var(--text-dim); font-size: 13px; }

        /* Log scrollbar */
        .log-body::-webkit-scrollbar { width: 6px; }
        .log-body::-webkit-scrollbar-track { background: transparent; }
        .log-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .log-body::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

        /* Value popup */
        .value-popup-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        .value-popup-box {
            background: var(--surface); border: 1px solid var(--border-light);
            border-radius: 12px; padding: 24px; max-width: 900px; width: 90%;
            max-height: 80vh; overflow-y: auto; box-shadow: var(--shadow-lg);
            animation: slideUp 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .value-popup-box .popup-value {
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
            font-size: 13px; line-height: 1.6; word-break: break-all;
            white-space: pre-wrap; color: var(--text);
            background: var(--bg); padding: 14px; border-radius: 8px;
            border: 1px solid var(--border); margin: 12px 0;
        }
        .value-popup-box .popup-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px;
        }
        .value-popup-box .popup-close {
            background: none; border: 1px solid var(--border); color: var(--text-dim);
            padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
            transition: all var(--transition-fast);
        }
        .value-popup-box .popup-close:hover {
            background: var(--surface-hover); color: var(--text);
        }
        .detail-value-clickable {
            cursor: pointer; border-bottom: 1px dashed var(--accent);
            transition: all var(--transition-fast);
        }
        .detail-value-clickable:hover { opacity: 0.7; }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>
        🔑 Session Manager
        <span class="badge badge-ok">v1.0</span>
    </h1>

    <!-- ====== MCP 连接状态 ====== -->
    <div id="mcp-status" class="status-bar">
        <span class="status-dot disconnected"></span>
        <span class="status-label">MCP 未连接</span>
        <select class="browser-select" id="browser-mode" onchange="onBrowserModeChange()">
            <option value="user">👤 用户浏览器</option>
            <option value="temp">🆕 临时浏览器</option>
        </select>
        <button class="btn-outline" onclick="connectMcp()" id="btn-connect">连接</button>
        <button class="btn-outline danger" onclick="disconnectMcp()" id="btn-disconnect" style="display:none">断开</button>
        <span class="status-idle" id="status-idle"></span>
    </div>

    <!-- ====== 添加站点 ====== -->
    <div class="card">
        <h2>➕ 添加新站点</h2>
        <div class="add-row">
            <input
                type="text" id="domain-input" name="domain"
                placeholder="输入域名或 URL，如 yuanbao.tencent.com 或 https://example.com/path"
                onkeydown="if(event.key==='Enter') startGrab()"
            >
            <button class="btn btn-primary" onclick="startGrab()" id="btn-grab">
                抓取 Cookie
            </button>
        </div>
        <div id="progress" class="progress">
            <div style="display:flex;align-items:center;gap:10px">
                <span id="progress-text" class="progress-text" style="flex:1">准备中...</span>
                <button class="btn btn-sm btn-danger" id="btn-stop" onclick="stopGrab()" style="display:none">停止</button>
            </div>
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
        </div>
    </div>

    <!-- ====== 站点列表 ====== -->
    <div class="card">
        <h2>📋 已存储站点</h2>
        <div id="session-list"
             hx-get="/api/sessions"
             hx-trigger="load, every:30s, refresh-sessions from:body"
             hx-swap="innerHTML">
            <div class="empty-state">加载中...</div>
        </div>
    </div>

    <!-- ====== 运行日志 ====== -->
    <div class="log-panel">
        <div class="log-header" onclick="toggleLogPanel()">
            <h2>📋 运行日志</h2>
            <span class="log-count" id="log-count">0</span>
            <div class="log-actions" onclick="event.stopPropagation()">
                <button class="log-btn" onclick="clearLogs()">清除</button>
            </div>
        </div>
        <div class="log-body" id="log-body">
            <div class="log-empty" id="log-empty">等待日志...</div>
        </div>
    </div>
</div>

<script>
let currentTaskId = null;
let currentEventSource = null;
let currentRefreshDomain = null;  // 当前正在刷新的域名

function stopGrab() {
    if (!currentTaskId) return;
    document.getElementById('progress-text').textContent = '正在停止...';
    document.getElementById('btn-stop').disabled = true;
    fetch(`/api/sessions/grab/${currentTaskId}/cancel`, { method: 'POST' })
        .catch(() => {});
}

function startGrab() {
    const domain = document.getElementById('domain-input').value.trim();
    if (!domain) return;

    const progress = document.getElementById('progress');
    const progressText = document.getElementById('progress-text');
    const progressFill = document.getElementById('progress-fill');
    const btnGrab = document.getElementById('btn-grab');
    const btnStop = document.getElementById('btn-stop');
    progress.classList.add('active');
    progressText.textContent = '正在启动...';
    progressFill.style.width = '0%';
    progressFill.style.background = 'var(--accent)';
    currentRefreshDomain = null;
    btnGrab.textContent = '抓取中...';
    btnGrab.disabled = true;
    btnStop.style.display = '';
    btnStop.disabled = false;

    // Close previous SSE
    if (currentEventSource) currentEventSource.close();

    fetch(`/api/sessions/grab?domain=${encodeURIComponent(domain)}`)
        .then(r => r.json())
        .then(data => {
            if (data.error) {
                showToast(data.error, 'error');
                resetGrabButton();
                return;
            }
            currentTaskId = data.task_id;
            listenProgress(data.task_id);
        })
        .catch(e => {
            showToast('请求失败: ' + e.message, 'error');
            resetGrabButton();
        });
}

function resetGrabButton() {
    const progress = document.getElementById('progress');
    const btnGrab = document.getElementById('btn-grab');
    const btnStop = document.getElementById('btn-stop');
    progress.classList.remove('active');
    btnGrab.textContent = '抓取 Cookie';
    btnGrab.disabled = false;
    btnStop.style.display = 'none';
    currentTaskId = null;
    currentRefreshDomain = null;
}

function listenProgress(taskId) {
    const progressText = document.getElementById('progress-text');
    const progressFill = document.getElementById('progress-fill');
    const progress = document.getElementById('progress');

    const stages = { waiting: 15, listing: 30, found: 45, selecting: 50, navigating: 55, evaluating: 80, done: 95 };

    currentEventSource = new EventSource(`/api/sessions/grab/progress?task_id=${taskId}`);

    currentEventSource.onmessage = (event) => {
        const data = JSON.parse(event.data);
        progressText.textContent = data.detail;
        const pct = stages[data.stage] || 50;
        progressFill.style.width = pct + '%';

        if (data.stage === 'completed') {
            progressFill.style.width = '100%';
            progressText.textContent = data.detail;
            setTimeout(() => {
                resetGrabButton();
                // 如果有刷新域名，重置刷新按钮
                if (currentRefreshDomain) {
                    const encDom = encodeURIComponent(currentRefreshDomain);
                    const btn = document.getElementById('refresh-btn-' + encDom);
                    if (btn) { btn.disabled = false; btn.textContent = '更新'; }
                }
                htmx.trigger('#session-list', 'refresh-sessions');
                showToast(data.detail, 'success');
                updateMcpStatus();
            }, 800);
            currentEventSource.close();
        }
        if (data.stage === 'error') {
            progressFill.style.background = 'var(--red)';
            progressText.textContent = '✗ ' + data.detail;
            setTimeout(() => {
                resetGrabButton();
                if (currentRefreshDomain) {
                    const encDom = encodeURIComponent(currentRefreshDomain);
                    const btn = document.getElementById('refresh-btn-' + encDom);
                    if (btn) { btn.disabled = false; btn.textContent = '更新'; }
                }
                progressFill.style.background = 'var(--accent)';
            }, 3000);
            showToast(data.detail, 'error');
            currentEventSource.close();
        }
        if (data.stage === 'cancelled') {
            progressFill.style.background = 'var(--orange)';
            progressText.textContent = '⏹ ' + data.detail;
            setTimeout(() => {
                resetGrabButton();
                if (currentRefreshDomain) {
                    const encDom = encodeURIComponent(currentRefreshDomain);
                    const btn = document.getElementById('refresh-btn-' + encDom);
                    if (btn) { btn.disabled = false; btn.textContent = '更新'; }
                }
                progressFill.style.background = 'var(--accent)';
            }, 3000);
            showToast(data.detail, 'error');
            currentEventSource.close();
        }
    };

    currentEventSource.onerror = () => {
        if (currentEventSource.readyState === EventSource.CLOSED) {
            resetGrabButton();
        }
    };
}

function deleteSession(domain) {
    if (!confirm(`确认删除 ${domain}？`)) return;
    fetch(`/api/sessions/${encodeURIComponent(domain)}`, { method: 'DELETE' })
        .then(r => r.json())
        .then(data => {
            if (data.error) showToast(data.error, 'error');
            else showToast(`已删除 ${domain}`, 'success');
            htmx.trigger('#session-list', 'refresh-sessions');
        });
}

function domainToId(domain) {
    return 'detail-' + encodeURIComponent(domain);
}

function showValuePopup(label, fullValue) {
    const overlay = document.createElement('div');
    overlay.className = 'value-popup-overlay';
    overlay.innerHTML = `<div class="value-popup-box">
        <div class="popup-header">
            <span style="color:var(--accent);font-weight:600">${escHtml(label)}</span>
            <button class="popup-close" onclick="this.closest('.value-popup-overlay').remove()">关闭</button>
        </div>
        <div class="popup-value">${escHtml(fullValue)}</div>
    </div>`;
    overlay.addEventListener('click', (e) => {
        if (e.target === overlay) overlay.remove();
    });
    document.body.appendChild(overlay);
}

function truncateValue(value, maxLen) {
    if (!value) return '';
    return value.length > maxLen ? value.slice(0, maxLen) + '...' : value;
}

function detailValueHtml(label, fullValue, maxLen) {
    if (!fullValue) return `<span class="detail-value"></span>`;
    if (fullValue.length <= maxLen) {
        return `<span class="detail-value">${escHtml(fullValue)}</span>`;
    }
    const truncated = escHtml(fullValue.slice(0, maxLen)) + '...';
    const safeLabel = escHtml(label).replace(/'/g, "\\'");
    const safeValue = escHtml(fullValue).replace(/'/g, "\\'");
    return `<span class="detail-value">
        <span>${truncated}</span>
        <span class="detail-value-clickable" onclick="event.stopPropagation();showValuePopup('${safeLabel}','${safeValue}')" style="margin-left:4px;font-size:12px">查看全部</span>
    </span>`;
}

function toggleDetail(encodedDomain) {
    const el = document.getElementById('detail-' + encodedDomain);
    if (!el) return;
    if (el.style.display === 'none') {
        const originalDomain = decodeURIComponent(encodedDomain);
        fetch(`/api/sessions/${encodeURIComponent(originalDomain)}`)
            .then(r => r.json())
            .then(site => {
                let html = '<div class="card" style="margin-top:10px">';

                // 原始 URL
                if (site.original_url) {
                    html += `<div class="detail-row"><span class="detail-name">原始 URL</span><span class="detail-value" style="color:var(--accent)">${escHtml(site.original_url)}</span></div>`;
                }

                // Cookie 区域
                html += '<h3>Cookie 详情</h3>';
                const cookies = site.cookies || '';
                if (!cookies) {
                    html += '<div class="empty-state" style="padding:10px">无 Cookie</div>';
                } else {
                    html += `<div class="detail-row"><span class="detail-name">原始字符串</span><span class="detail-value">${escHtml(cookies)}</span></div>`;
                }

                // 认证凭据区域
                const authTokens = site.auth_tokens || [];
                html += `<div class="detail-section-title">🔐 认证凭据 <span class="auth-badge">${authTokens.length}</span></div>`;
                if (authTokens.length > 0) {
                    for (const t of authTokens) {
                        html += `<div class="detail-row detail-row-auth"><span class="detail-name">${escHtml(t.key)} <small style="color:var(--text-dim)">[${t.source}]</small></span>${detailValueHtml(t.key, t.value, 200)}</div>`;
                    }
                } else {
                    html += '<div class="empty-state" style="padding:6px;font-size:12px;color:var(--text-dim)">暂无</div>';
                }

                // 公共 Request Headers 区域
                const headers = site.headers || {};
                html += `<div class="detail-section-title" style="color:var(--accent)">📡 公共 Request Headers <span class="auth-badge" style="background:var(--accent)">${Object.keys(headers).length}</span></div>`;
                if (Object.keys(headers).length > 0) {
                    for (const [k, v] of Object.entries(headers)) {
                        html += `<div class="detail-row"><span class="detail-name" style="color:var(--accent)">${escHtml(k)}</span>${detailValueHtml(k, v, 200)}</div>`;
                    }
                } else {
                    html += '<div class="empty-state" style="padding:6px;font-size:12px;color:var(--text-dim)">暂无</div>';
                }

                // 原始请求列表区域
                const rawRequests = site.raw_requests || [];
                html += `<div class="detail-section-title">📋 原始请求列表 <span class="auth-badge">${rawRequests.length}</span></div>`;
                if (rawRequests.length > 0) {
                    html += '<div style="font-size:12px;max-height:300px;overflow-y:auto">';
                    for (const req of rawRequests) {
                        const shortUrl = req.url.length > 60 ? req.url.slice(0, 60) + '...' : req.url;
                        html += `<div style="margin:6px 0;padding:6px;background:var(--bg);border-radius:4px;border:1px solid var(--border)">`;
                        html += `<span style="color:var(--green);font-weight:600">${escHtml(req.method || 'GET')}</span> `;
                        html += `<span style="color:var(--text-dim)">${escHtml(shortUrl)}</span>`;
                        html += `<details style="margin-top:4px"><summary style="cursor:pointer;color:var(--text-dim);font-size:11px">${Object.keys(req.headers||{}).length} 个 Header</summary>`;
                        for (const [hk, hv] of Object.entries(req.headers || {})) {
                            const dhv = hv.length > 60 ? hv.slice(0, 60) + '...' : hv;
                            html += `<div style="font-size:11px;margin-left:12px"><span style="color:var(--accent)">${escHtml(hk)}:</span> ${escHtml(dhv)}</div>`;
                        }
                        html += `</details></div>`;
                    }
                    html += '</div>';
                } else {
                    html += '<div class="empty-state" style="padding:6px;font-size:12px;color:var(--text-dim)">暂无</div>';
                }

                // 关联域名区域
                const relatedDomains = site.related_domains || [];
                html += `<div class="detail-section-title" style="color:var(--green)">🔗 关联域名 <span class="auth-badge" style="background:var(--green)">${relatedDomains.length}</span></div>`;
                if (relatedDomains.length > 0) {
                    html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin:6px 0">';
                    for (const d of relatedDomains) {
                        html += `<span style="font-size:12px;padding:4px 10px;background:var(--bg);border-radius:12px;border:1px solid var(--border);color:var(--text-dim)">${escHtml(d)}</span>`;
                    }
                    html += '</div>';
                } else {
                    html += '<div class="empty-state" style="padding:6px;font-size:12px;color:var(--text-dim)">暂无</div>';
                }

                html += '</div>';
                el.innerHTML = html;
                el.style.display = 'block';
            });
    } else {
        el.style.display = 'none';
    }
}

function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type) {
    const t = document.createElement('div');
    t.className = 'toast toast-' + type;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => {
        t.style.animation = 'fadeOut 0.3s ease forwards';
        setTimeout(() => t.remove(), 300);
    }, 2700);
}

// ── MCP 连接状态管理 ──────────────────────────────────────

let mcpPollInterval = null;

function pollMcpStatus() {
    if (mcpPollInterval) clearInterval(mcpPollInterval);
    mcpPollInterval = setInterval(updateMcpStatus, 3000);
    updateMcpStatus();
}

function updateMcpStatus() {
    fetch('/api/mcp/status')
        .then(r => r.json())
        .then(data => {
            const dot = document.querySelector('#mcp-status .status-dot');
            const label = document.querySelector('#mcp-status .status-label');
            const btnConnect = document.getElementById('btn-connect');
            const btnDisconnect = document.getElementById('btn-disconnect');
            const idleEl = document.getElementById('status-idle');

            dot.className = 'status-dot';
            if (data.connected) {
                dot.classList.add('connected');
                const modeLabel = data.browser_mode === 'temp' ? '（临时浏览器）' : '（用户浏览器）';
                label.textContent = 'MCP 已连接 ' + modeLabel;
                btnConnect.style.display = 'none';
                btnDisconnect.style.display = '';
                const mins = Math.floor(data.idle_seconds / 60);
                const secs = Math.floor(data.idle_seconds % 60);
                idleEl.textContent = mins > 0 ? `空闲 ${mins}m${secs}s` : `空闲 ${secs}s`;
                // 更新浏览器模式选择器
                const sel = document.getElementById('browser-mode');
                if (sel && data.browser_mode) sel.value = data.browser_mode;
            } else {
                dot.classList.add('disconnected');
                label.textContent = 'MCP 未连接';
                btnConnect.style.display = '';
                btnDisconnect.style.display = 'none';
                idleEl.textContent = '';
            }
        })
        .catch(() => {}); // 服务器未启动时静默失败
}

function connectMcp() {
    const dot = document.querySelector('#mcp-status .status-dot');
    const label = document.querySelector('#mcp-status .status-label');
    dot.className = 'status-dot connecting';
    label.textContent = '连接中...';

    const browserMode = document.getElementById('browser-mode').value;
    fetch(`/api/mcp/connect?browser_mode=${browserMode}`, { method: 'POST' })
        .then(r => r.json())
        .then(data => {
            if (data.status === 'connected' || data.status === 'already_connected') {
                showToast('MCP 已连接', 'success');
                updateMcpStatus();
            } else if (data.error) {
                showToast('连接失败: ' + data.error, 'error');
                dot.className = 'status-dot disconnected';
                label.textContent = 'MCP 未连接';
            }
        })
        .catch(e => {
            showToast('连接失败: ' + e.message, 'error');
            dot.className = 'status-dot disconnected';
            label.textContent = 'MCP 未连接';
        });
}

function onBrowserModeChange() {
    // 浏览器模式切换，如果已连接则提示需要重新连接
    const mode = document.getElementById('browser-mode').value;
    const modeLabel = mode === 'temp' ? '临时浏览器' : '用户浏览器';
    showToast('已切换到 ' + modeLabel + ' 模式，变更将在下次连接时生效', 'success');
}

function disconnectMcp() {
    fetch('/api/mcp/disconnect', { method: 'POST' })
        .then(r => r.json())
        .then(data => {
            showToast('MCP 已断开', 'success');
            updateMcpStatus();
        });
}

// ── 运行日志面板 ──────────────────────────────────────────

let logEventSource = null;
let logCount = 0;

function initLogPanel() {
    if (logEventSource) logEventSource.close();
    logEventSource = new EventSource('/api/logs/stream');
    logEventSource.onmessage = function(event) {
        try {
            const entry = JSON.parse(event.data);
            appendLogEntry(entry);
        } catch(e) {}
    };
    logEventSource.onerror = function() {
        // 自动重连
    };
}

function appendLogEntry(entry) {
    const body = document.getElementById('log-body');
    const empty = document.getElementById('log-empty');
    if (empty) empty.style.display = 'none';

    const div = document.createElement('div');
    div.className = 'log-entry';

    const time = document.createElement('span');
    time.className = 'log-time';
    time.textContent = entry.time || '';

    const tag = document.createElement('span');
    tag.className = 'log-tag ' + (entry.stage || '');
    tag.textContent = entry.stage || '';

    const msg = document.createElement('span');
    msg.className = 'log-msg';
    msg.textContent = entry.detail || '';

    div.appendChild(time);
    div.appendChild(tag);
    div.appendChild(msg);
    body.appendChild(div);

    logCount++;
    const countEl = document.getElementById('log-count');
    if (countEl) countEl.textContent = logCount;

    // 自动滚动
    body.scrollTop = body.scrollHeight;
}

function toggleLogPanel() {
    const body = document.getElementById('log-body');
    body.classList.toggle('collapsed');
}

function clearLogs() {
    const body = document.getElementById('log-body');
    body.innerHTML = '<div class="log-empty" id="log-empty">日志已清除</div>';
    logCount = 0;
    const countEl = document.getElementById('log-count');
    if (countEl) countEl.textContent = '0';
}

// 页面加载时初始化日志
initLogPanel();

function refreshSession(domain) {
    const encDom = encodeURIComponent(domain);
    const btn = document.getElementById('refresh-btn-' + encDom);
    if (btn) {
        btn.disabled = true;
        btn.textContent = '更新中...';
    }

    const progress = document.getElementById('progress');
    const progressText = document.getElementById('progress-text');
    const progressFill = document.getElementById('progress-fill');
    const btnGrab = document.getElementById('btn-grab');
    const btnStop = document.getElementById('btn-stop');
    progress.classList.add('active');
    progressText.textContent = '正在更新 ' + domain + ' ...';
    progressFill.style.width = '0%';
    progressFill.style.background = 'var(--accent)';
    currentRefreshDomain = domain;
    btnGrab.textContent = '抓取中...';
    btnGrab.disabled = true;
    btnStop.style.display = '';
    btnStop.disabled = false;

    if (currentEventSource) currentEventSource.close();

    fetch(`/api/sessions/${encodeURIComponent(domain)}/refresh`, { method: 'POST' })
        .then(r => r.json())
        .then(data => {
            if (data.error) {
                showToast(data.error, 'error');
                resetGrabButton();
                if (btn) { btn.disabled = false; btn.textContent = '更新'; }
                return;
            }
            currentTaskId = data.task_id;
            listenProgress(data.task_id);
        })
        .catch(e => {
            showToast('更新失败: ' + e.message, 'error');
            resetGrabButton();
            if (btn) { btn.disabled = false; btn.textContent = '更新'; }
        });
}

// ── 初始化 ────────────────────────────────────────────────

pollMcpStatus();

<!-- Server-side rendered session list (fallback) -->
<script>
// HTMX will call /api/sessions which returns JSON.
// We use a custom extension to render the JSON as HTML.
document.body.addEventListener('htmx:beforeSwap', function(evt) {
    if (evt.detail.target.id === 'session-list' && evt.detail.xhr) {
        try {
            const data = JSON.parse(evt.detail.xhr.responseText);
            if (data.error) {
                evt.detail.serverResponse = `<div class="empty-state">${escHtml(data.error)}</div>`;
                return;
            }
            let html = '';
            if (!data || data.length === 0) {
                html = '<div class="empty-state">暂无已存储的站点<br><small>在上方输入域名并点击抓取</small></div>';
            } else {
                for (const s of data) {
                    const tag = s.expired
                        ? '<span class="session-tag tag-expired">已过期</span>'
                        : '<span class="session-tag tag-active">可用</span>';
                    const atInfo = s.auth_token_count ? ` · ${s.auth_token_count} 凭据` : '';
                    const hdrInfo = s.header_count ? ` · ${s.header_count} Header` : '';
                    const relInfo = s.related_domain_count ? ` · ${s.related_domain_count} 关联` : '';
                    const urlInfo = s.original_url ? `<div class="session-meta" style="color:var(--accent);font-size:11px">${escHtml(s.original_url)}</div>` : '';
                    const encDom = encodeURIComponent(s.domain);
                    html += `
                    <div class="session-item" onclick="toggleDetail('${encDom}')">
                        <span class="session-icon">🌐</span>
                        <div class="session-info">
                            <div class="session-domain">${escHtml(s.domain)} ${tag}</div>
                            <div class="session-meta">${s.cookie_count} 个 Cookie${atInfo}${hdrInfo}${relInfo} · 过期 ${s.expires_at.slice(0, 10)}</div>
                            ${urlInfo}
                        </div>
                        <div class="session-actions">
                            <button class="btn btn-sm btn-refresh" onclick="event.stopPropagation();refreshSession('${escHtml(s.domain)}')" id="refresh-btn-${encDom}">更新</button>
                            <button class="btn btn-sm btn-primary" onclick="event.stopPropagation();toggleDetail('${encDom}')">查看</button>
                            <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteSession('${escHtml(s.domain)}')">删除</button>
                        </div>
                    </div>
                    <div id="detail-${encodeURIComponent(s.domain)}" style="display:none"></div>`;
                }
            }
            evt.detail.serverResponse = html;
        } catch(e) { /* use raw response */ }
    }
});
</script>
